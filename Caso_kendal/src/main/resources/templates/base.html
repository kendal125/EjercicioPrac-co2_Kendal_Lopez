<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="plantillaBase(titulo, contenido)">
    <head>
        <meta charset="UTF-8">
        <title th:text="${titulo}">Plataforma de Eventos</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body class="d-flex flex-column min-vh-100 bg-light">

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" th:href="@{/eventos}">
                    <i class="fa-solid fa-ticket-alt text-warning"></i> EventosApp
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/eventos}">Eventos</a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                            <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                            <a class="nav-link" th:href="@{/roles}">Roles</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/consultas}">Consultas</a>
                        </li>
                    </ul>

                    <ul class="navbar-nav" sec:authorize="isAuthenticated()">
                        <li class="nav-item">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm mt-1">
                                    <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container mt-5 flex-grow-1">
            <div th:replace="${contenido}"></div>
        </main>

        <footer class="bg-dark text-white text-center py-4 mt-auto">
            <p class="mb-0">&copy; 2026 Plataforma de Reservas de Eventos - Evaluación</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script th:src="@{/js/script.js}"></script>
    </body>
</html>
