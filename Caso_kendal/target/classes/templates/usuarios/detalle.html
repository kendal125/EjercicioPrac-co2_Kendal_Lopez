<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: plantillaBase('Ficha de Usuario', ~{::section})}">
<body>

<section>
    <div class="row justify-content-center mt-4">
        <div class="col-md-8 col-lg-5">
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-info text-dark d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-address-card me-2"></i>Información Detallada</h5>
                    <a th:href="@{/usuarios}" class="btn btn-sm btn-outline-dark">
                        <i class="fa-solid fa-arrow-left"></i> Volver
                    </a>
                </div>
                
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img th:src="@{'/img/' + ${usuario.foto != null ? usuario.foto : 'default.png'}}" 
                             class="rounded-circle img-thumbnail shadow-sm mb-3" 
                             style="width: 140px; height: 140px; object-fit: cover;" 
                             alt="Foto de perfil">
                        <h4 class="text-primary fw-bold mb-0" th:text="${usuario.nombre}"></h4>
                        <span class="text-muted" th:text="${usuario.email}"></span>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted fw-bold">ID Interno:</span>
                            <span th:text="${usuario.id}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted fw-bold">Nivel de Acceso:</span>
                            <span class="badge bg-dark fs-6" th:text="${usuario.rol?.nombre}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted fw-bold">Estado del Perfil:</span>
                            <span th:if="${usuario.activo}" class="badge bg-success rounded-pill px-3">Activo</span>
                            <span th:unless="${usuario.activo}" class="badge bg-danger rounded-pill px-3">Inactivo</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted fw-bold">Fecha de Registro:</span>
                            <span th:text="${#temporals.format(usuario.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>
                        </li>
                    </ul>
                    
                    <div class="mt-4">
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-warning w-100 fw-bold shadow-sm">
                            <i class="fa-solid fa-user-pen me-1"></i> Modificar Datos
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
