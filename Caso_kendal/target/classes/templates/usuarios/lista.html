<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: plantillaBase('Directorio de Usuarios', ~{::section})}">
<body>

<section>
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <h2 class="fw-bold text-dark"><i class="fa-solid fa-users-rectangle text-primary me-2"></i>Gestión de Cuentas de Usuario</h2>
        <a th:href="@{/usuarios/nuevo}" class="btn btn-success shadow-sm">
            <i class="fa-solid fa-user-plus"></i> Registrar Usuario
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3 text-center">Avatar</th> <th>ID</th>
                            <th>Nombre Completo</th>
                            <th>Correo / Username</th>
                            <th>Rol Asignado</th>
                            <th>Acceso</th>
                            <th class="text-center">Panel de Control</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="filaUsuario : ${usuarios}">
                            <td class="text-center ps-3">
                                <img th:src="@{'/img/' + ${filaUsuario.foto != null ? filaUsuario.foto : 'default.png'}}" 
                                     class="rounded-circle border" 
                                     style="width: 40px; height: 40px; object-fit: cover;" 
                                     alt="Perfil">
                            </td>
                            
                            <td class="text-muted fw-bold" th:text="${filaUsuario.id}"></td>
                            <td class="fw-bold" th:text="${filaUsuario.nombre}"></td>
                            <td><i class="fa-regular fa-envelope text-secondary me-1"></i> <span th:text="${filaUsuario.email}"></span></td>
                            <td>
                                <span class="badge bg-dark" th:text="${filaUsuario.rol?.nombre}"></span>
                            </td>
                            <td>
                                <i class="fa-solid fa-circle-check text-success fs-5" th:if="${filaUsuario.activo}" title="Activo"></i>
                                <i class="fa-solid fa-circle-xmark text-danger fs-5" th:unless="${filaUsuario.activo}" title="Inactivo"></i>
                            </td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <a th:href="@{/usuarios/detalle/{id}(id=${filaUsuario.id})}" class="btn btn-sm btn-outline-info text-dark" title="Ver Detalles">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a th:href="@{/usuarios/editar/{id}(id=${filaUsuario.id})}" class="btn btn-sm btn-outline-warning text-dark" title="Editar">
                                        <i class="fa-solid fa-user-pen"></i>
                                    </a>
                                    <a th:href="@{/usuarios/eliminar/{id}(id=${filaUsuario.id})}" class="btn btn-sm btn-outline-danger" title="Eliminar"
                                       onclick="return confirm('ATENCIÓN: ¿Está seguro que desea eliminar este usuario?');">
                                        <i class="fa-solid fa-user-minus"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="7" class="text-center py-4 text-muted">
                                <i class="fa-solid fa-users-slash fs-2 mb-2 d-block"></i> No hay usuarios registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

</body>
</html>
