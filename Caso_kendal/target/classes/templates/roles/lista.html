<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: plantillaBase('Administración de Roles', ~{::section})}">
    <body>

        <section>

            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h2 class="fw-bold text-dark"><i class="fa-solid fa-id-badge text-primary me-2"></i>Gestión de Roles del Sistema</h2>

                <a th:href="@{/roles/nuevo}" class="btn btn-success shadow-sm">
                    <i class="fa-solid fa-plus-circle"></i> Agregar Nuevo Rol
                </a>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th class="ps-4 w-25">ID del Rol</th>
                                            <th>Nombre Asignado</th>
                                            <th class="text-center w-25">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="rolItem : ${roles}">
                                            <td class="ps-4 fw-bold text-muted" th:text="${rolItem.id}"></td>

                                            <td>
                                                <span class="badge bg-info text-dark fs-6" th:text="${rolItem.nombre}"></span>
                                            </td>

                                            <td class="text-center">
                                                <div class="btn-group" role="group">
                                                    <a th:href="@{/roles/editar/{id}(id=${rolItem.id})}" class="btn btn-sm btn-outline-warning text-dark" title="Editar Rol">
                                                        <i class="fa-solid fa-pen-to-square"></i> Editar
                                                    </a>
                                                    <a th:href="@{/roles/eliminar/{id}(id=${rolItem.id})}" class="btn btn-sm btn-outline-danger" title="Eliminar Rol"
                                                       onclick="return confirm('CUIDADO: Eliminar un rol puede afectar a los usuarios que lo tengan asignado. ¿Desea continuar?');">
                                                        <i class="fa-solid fa-trash-can"></i> Borrar
                                                    </a>
                                                </div>
                                            </td>
                                        </tr>

                                        <tr th:if="${#lists.isEmpty(roles)}">
                                            <td colspan="3" class="text-center py-4 text-muted">
                                                <i class="fa-solid fa-folder-open fs-2 mb-2 d-block"></i>
                                                Aún no se han configurado roles en la base de datos.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>

    </body>
</html>
