<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: plantillaBase(${evento.id == null ? 'Nuevo Evento' : 'Editar Evento'}, ~{::section})}">
    <body>

        <section>
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">

                    <div class="card shadow-sm border-0 mt-3">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-calendar-plus me-2" th:if="${evento.id == null}"></i>
                                <i class="fa-solid fa-pen-to-square me-2" th:unless="${evento.id == null}"></i>
                                <span th:text="${evento.id == null} ? 'Registro de Nuevo Evento' : 'Modificación de Evento'"></span>
                            </h4>
                            <a th:href="@{/eventos}" class="btn btn-outline-light btn-sm">
                                <i class="fa-solid fa-arrow-left"></i> Volver a la lista
                            </a>
                        </div>

                        <div class="card-body p-4">
                            <form th:action="@{/eventos/guardar}" th:object="${evento}" method="post">
                                <input type="hidden" th:field="*{id}">

                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label fw-bold text-secondary">Nombre del Evento <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej. Conferencia Anual..." required>
                                    </div>

                                    <div class="col-md-12">
                                        <label class="form-label fw-bold text-secondary">Descripción Detallada</label>
                                        <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Detalles de las actividades..."></textarea>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Fecha Programada <span class="text-danger">*</span></label>
                                        <input type="date" th:field="*{fecha}" class="form-control" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-secondary">Capacidad Máxima (Aforo) <span class="text-danger">*</span></label>
                                        <input type="number" th:field="*{capacidad}" class="form-control" min="1" required>
                                    </div>

                                    <div class="col-md-12 mt-4">
                                        <div class="form-check form-switch fs-5">
                                            <input type="checkbox" th:field="*{activo}" class="form-check-input" id="switchEstado" role="switch">
                                            <label class="form-check-label ms-2" for="switchEstado">El evento se encuentra <strong>Activo</strong></label>
                                        </div>
                                    </div>
                                </div>

                                <hr class="my-4 text-muted">

                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/eventos}" class="btn btn-secondary">
                                        <i class="fa-solid fa-xmark"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-success px-4">
                                        <i class="fa-solid fa-floppy-disk"></i> Guardar Evento
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </section>

    </body>
</html>
