<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{base :: plantillaBase('Gestión de Eventos', ~{::section})}">
    <body>

        <section>

            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h2 class="fw-bold text-dark"><i class="fa-solid fa-calendar-days text-primary me-2"></i>Catálogo de Eventos</h2>

                <a th:href="@{/eventos/nuevo}" class="btn btn-success shadow-sm" sec:authorize="hasAnyAuthority('ADMIN', 'ORGANIZADOR')">
                    <i class="fa-solid fa-circle-plus"></i> Registrar Nuevo Evento
                </a>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-3">Código</th>
                                    <th>Nombre del Evento</th>
                                    <th>Fecha</th>
                                    <th>Aforo</th>
                                    <th>Estado</th>
                                    <th class="text-center" sec:authorize="hasAnyAuthority('ADMIN', 'ORGANIZADOR')">Gestión</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="itemEvento : ${eventos}">
                                    <td class="ps-3 text-muted fw-bold" th:text="${itemEvento.id}"></td>
                                    <td class="fw-bold text-primary" th:text="${itemEvento.nombre}"></td>

                                    <td th:text="${#temporals.format(itemEvento.fecha, 'dd/MM/yyyy')}"></td>

                                    <td><i class="fa-solid fa-users text-secondary me-1"></i> <span th:text="${itemEvento.capacidad}"></span></td>

                                    <td>
                                        <span th:if="${itemEvento.activo}" class="badge bg-success rounded-pill px-3 py-2">
                                            <i class="fa-solid fa-check me-1"></i>Activo
                                        </span>
                                        <span th:unless="${itemEvento.activo}" class="badge bg-secondary rounded-pill px-3 py-2">
                                            <i class="fa-solid fa-xmark me-1"></i>Inactivo
                                        </span>
                                    </td>

                                    <td class="text-center" sec:authorize="hasAnyAuthority('ADMIN', 'ORGANIZADOR')">
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/eventos/editar/{id}(id=${itemEvento.id})}" class="btn btn-sm btn-outline-warning text-dark" title="Editar">
                                                <i class="fa-solid fa-pen"></i>
                                            </a>
                                            <a th:href="@{/eventos/eliminar/{id}(id=${itemEvento.id})}" class="btn btn-sm btn-outline-danger" title="Eliminar"
                                               onclick="return confirm('ATENCIÓN: ¿Está seguro que desea eliminar este evento del sistema?');">
                                                <i class="fa-solid fa-trash-can"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(eventos)}">
                                    <td colspan="6" class="text-center py-4 text-muted">
                                        <i class="fa-solid fa-calendar-xmark fs-2 mb-2 d-block"></i>
                                        No hay eventos registrados en este momento.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </section>

    </body>
</html>
